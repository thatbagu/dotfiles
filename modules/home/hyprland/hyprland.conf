$mainMod = SUPER
# Monitors
monitor=,preferred,auto,auto
# Gaming-specific settings
misc {
    # Reduce latency
    focus_on_activate = true  # Better for game overlays
}

# Cursor settings
cursor {
    # Hide cursor after 3 seconds of inactivity
    inactive_timeout = 3
}
# Set programs that you use
$terminal = foot
$fileManager = yazi
$terminalFileManager = $terminal -e yazi
$menu = fuzzel
$browser = firefox
$screenshot = grim -g "$(slurp)" - | wl-copy  # Screenshot to clipboard
$screenshot_save = grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png  # Save screenshot

# Autostart
exec-once = waybar &
exec-once = dunst & # Notification daemon
exec-once = hyprpaper
exec-once = ~/.config/hyprland/scripts/xdg-portal-hyprland # Portal
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # For XDPH
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # For XDPH

# Environment Variables
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = MOZ_ENABLE_WAYLAND,1
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = GTK_THEME,Adwaita:dark
env = GAMESCOPE_FORCE_GRAB_CURSOR,1
env = GAMESCOPE_DYNAMIC_SAMPLING,1
env = GAMESCOPE_FORCE_COMPOSITOR_MODE,1
env = SDL_VIDEODRIVER,wayland
env = STEAM_USE_GAMESCOPE,1


# Look and feel
general {
    gaps_in = 5
  gaps_out = 5
    border_size = 2
    col.active_border = rgba(cba6f7ee) rgba(89b4faee) 45deg
    col.inactive_border = rgba(1e1e2eaa) 
    resize_on_border = true
    layout = master
}

# Animations section will be added conditionally

# Master layout configuration for equal vertical windows
master {
    # Set orientation to left for vertical splits
    orientation = left
    
    # Make new windows masters
    new_status = master
    
    # Default split size
    mfact = 0.5
    
    # Other useful settings
    smart_resizing = true
}

# Add keybinding to toggle between vertical/horizontal layout
bind = $mainMod, Y, layoutmsg, orientationleft  # Vertical layout (side by side)
bind = $mainMod, U, layoutmsg, orientationtop   # Horizontal layout (stacked)

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.95

    blur {
        enabled = true
        size = 5
        passes = 2
        new_optimizations = true
        ignore_opacity = true
    }

}

# Input configuration
input {
    kb_layout = us,ru
    kb_variant = ,phonetic
    kb_options = grp:ctrl_space_toggle
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        disable_while_typing = true
        scroll_factor = 1.0
        middle_button_emulation = true
        tap-to-click = true
    }
}

# Window rules
windowrulev2 = float,class:^(pavucontrol)$
windowrulev2 = float,class:^(fish)$
windowrulev2 = float,class:^(firefox)$,title:^(Firefox — Sharing Indicator)$
windowrulev2 = float,class:^(firefox)$,title:^(Picture-in-Picture)$
windowrulev2 = pin,class:^(firefox)$,title:^(Picture-in-Picture)$
windowrulev2 = workspace special:ranger, title:^(ranger)$
windowrulev2 = workspace 3,class:^(mpv)$
windowrulev2 = workspace 3,class:^(pqiv)$
windowrulev2 = float,class:^(pqiv)$

windowrulev2 = float,class:^(steam)$,title:^(Friends List)$  # Float friends list
windowrulev2 = float,class:^(steam)$,title:^(Steam Settings)$  # Float settings window
windowrulev2 = center,class:^(steam)$,title:^(Steam Settings)$
windowrulev2 = float,class:^(steam)$,title:^(Properties)$  # Float properties windows
windowrulev2 = float,class:^(steam)$,title:.*(Guard)$  # Float Steam Guard window
windowrulev2 = center,class:^(steam)$,title:.*(Guard)$
windowrulev2 = float,class:^(steam)$,title:^(Screenshot Uploader)$  # Float screenshot uploader
windowrulev2 = float,class:^(steam)$,title:.*(.*)$  # Float game property windows
windowrulev2 = float,class:^(steam)$,title:^(Steam Keyboard)$
windowrulev2 = float,class:^(mangohud)$
windowrulev2 = noanim,class:^(mangohud)$
# Application keybindings
bind = $mainMod, B, exec, $browser
bind = $mainMod, D, exec, $menu
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod SHIFT, Q, exit
bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, Space, exec, hyprctl dispatch togglefloating active; hyprctl dispatch centerwindow
bind = $mainMod, Space, exec, hyprctl dispatch togglefloating active; hyprctl dispatch centerwindow

# File manager bindings
bind = $mainMod, E, exec, $terminalFileManager
bind = ALT, E, togglespecialworkspace, yazi

# Screenshot bindings
bind = , Print, exec, $screenshot
bind = SHIFT, Print, exec, $screenshot_save
bind = $mainMod, Print, exec, $screenshot

# Application launchers
bind = $mainMod, N, exec, dunstctl history-pop
bind = $mainMod SHIFT, N, exec, dunstctl close-all
bind = $mainMod,M, exec, pkill -SIGUSR1 waybar

# Media controls
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPlay, exec, playerctl play-pause

# Volume controls
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness controls
bind = SHIFT, XF86AudioRaiseVolume, exec, brightnessctl s 10%+
bind = SHIFT, XF86AudioLowerVolume, exec, brightnessctl s 10%-
bind = , XF86MonBrightnessUp, exec, brightnessctl s 10%+
bind = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Window navigation with vim-style keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Arrow keys for window focusing - FIXED SECTION
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Cycle through windows
bind = $mainMod, Tab, cyclenext,
bind = $mainMod SHIFT, Tab, cyclenext, prev

# Close window
bind = $mainMod, Q, killactive

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod ALT, N, workspace, e+1    # Next workspace
bind = $mainMod ALT, B, workspace, e-1    # Previous workspace
# Move windows with vim-style keys
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Move windows with arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Vim-style window resizing
bind = $mainMod CTRL, H, resizeactive, -50 0
bind = $mainMod CTRL, L, resizeactive, 50 0
bind = $mainMod CTRL, K, resizeactive, 0 -50
bind = $mainMod CTRL, J, resizeactive, 0 50

# Arrow keys window resizing
bind = $mainMod CTRL, left, resizeactive, -50 0
bind = $mainMod CTRL, right, resizeactive, 50 0
bind = $mainMod CTRL, up, resizeactive, 0 -50
bind = $mainMod CTRL, down, resizeactive, 0 50

# Move floating windows with keys
bind = $mainMod ALT, H, moveactive, -20 0
bind = $mainMod ALT, L, moveactive, 20 0
bind = $mainMod ALT, K, moveactive, 0 -20
bind = $mainMod ALT, J, moveactive, 0 20

# Arrow keys for moving floating windows
bind = $mainMod ALT, left, moveactive, -20 0
bind = $mainMod ALT, right, moveactive, 20 0
bind = $mainMod ALT, up, moveactive, 0 -20
bind = $mainMod ALT, down, moveactive, 0 20
